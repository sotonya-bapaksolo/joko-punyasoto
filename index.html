  <style amp-custom>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:monospace;background:#000;color:#ffd700;overflow:hidden;height:100vh; }
    .rain{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .raindrop{position:absolute;top:-10px;width:2px;height:10px;background:#ffd700;opacity:0.8;animation:fall linear infinite;}
    @keyframes fall{0%{transform:translateY(0)}100%{transform:translateY(110vh)}}
    .container{ position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:5px 0;text-align:center;}
    header{width:100%; display:flex; justify-content:center;align-items:center;margin-top:5px; }
    header amp-img{ display:block; width:80%;max-width:300px;height:auto; }
    .welcome h1{font-size:13px;color:#fff; white-space:nowrap;
      overflow:hidden;
      border-right:.12em solid #fbf4a0;
      letter-spacing:.08em;
      width:0;
      animation:typing 7s steps(40,end) infinite alternate, blink-caret .7s step-end infinite;
      margin:5px 0;
    }
    @keyframes typing{
      0%{width:0}
      50%{width:100%}
      100%{width:0}
    }
    @keyframes blink-caret{from,to{border-color:transparent}50%{border-color:#fbf4a0}}
    .banner{
      display:block;
      width:70%;
      max-width:270px;
      border-radius:10px;
      margin:10px 0;
      flex-shrink:0;
      animation:floaty 6s ease-in-out infinite;
    }
    @keyframes floaty{
      0%{transform:translate(0,0)}
      25%{transform:translate(5px,-5px)}
      50%{transform:translate(0,5px)}
      75%{transform:translate(-5px,-3px)}
      100%{transform:translate(0,0)}
    }
    .btn-row{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:15px;
      margin:12px 0 18px;
      width:100%;
      padding:0 15px;
    }
    .btn{
      display:block;
      width:100%;
      padding:14px 0;
      font-size:16px;
      font-weight:bold;
      border-radius:14px;
      text-decoration:none;
      text-align:center;
      color:#000;
      box-shadow:0 0 14px rgba(255,215,0,0.5);
      transition:transform .25s ease-in-out, box-shadow .25s ease-in-out, filter .25s ease-in-out;
    }
    .btn-login{
      background:linear-gradient(135deg,#fff75b,#ffd700);
    }
    .btn-daftar{
      background:linear-gradient(135deg,#ffe15d,#ffb300);
    }
    .btn:hover{
      transform:scale(1.08);
      box-shadow:0 0 25px #ffd700;
      filter:brightness(1.2);
    }
    .info-table{
      width:94%;
      max-width:390px;
      background:rgba(0,0,0,0.4);
      border-radius:12px;
      padding:12px;
      box-shadow:0 6px 25px rgba(255,215,0,0.25);
      color:#ffd700;
      font-size:13px;
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,215,0,0.3);
      margin-top:-10px;
      overflow:hidden;
      position:relative;
    }
    .info-table::before{
      content:'';position:absolute;top:0;left:-70%;
      width:50%;height:100%;
      background:linear-gradient(120deg,rgba(255,255,255,0),rgba(255,255,255,0.25),rgba(255,255,255,0));
      transform:skewX(-25deg);
      animation:shine 3s linear infinite;
    }
    @keyframes shine{0%{left:-70%}100%{left:120%}}
    .info-table table{
      width:100%;
      border-collapse:separate;
      border-spacing:0 6px;
    }
    .info-table td{
      padding:7px 9px;
      background:rgba(255,255,255,0.05);
      border-radius:8px;
      text-shadow:0 0 3px #ffd700;
    }
    .info-table td:first-child{font-weight:bold;width:45%;}
    .copyright{
      text-align:center;
      color:#ffffff96;
      margin-bottom:5px;
      font-size:11px;
    }
